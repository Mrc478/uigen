<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonial Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-neutral-950 px-4 py-12">

  <div class="relative w-full max-w-md">

    <div id="glow" class="absolute -inset-4 bg-gradient-to-br from-emerald-500/10 via-transparent to-cyan-500/10 rounded-3xl blur-2xl transition-opacity duration-700" style="opacity:1"></div>

    <div id="card" class="relative bg-neutral-900/80 backdrop-blur-xl border border-neutral-800 rounded-2xl p-8 shadow-2xl transition-all duration-500 ease-out" style="transform:translateX(0) scale(1);opacity:1">

      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-24 h-0.5 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full"></div>

      <svg class="absolute top-6 right-6 w-12 h-12 text-emerald-500/20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14.017 21v-7.391c0-5.952 4.5-8.646 4.5-10.609 0-2.757-2.243-5-5-5s-5 2.243-5 5c0 1.96.99 3.699 2.503 4.66v2.331h-2v7h12v-7h-2v-2.331c1.513-.961 2.503-2.7 2.503-4.66 0-2.757-2.243-5-5-5s-5 2.243-5 5c0 1.96.99 3.699 2.503 4.66v2.331h-2v7h12zm-14 0v-7.391c0-5.952 4.5-8.646 4.5-10.609 0-2.757-2.243-5-5-5s-5 2.243-5 5c0 1.96.99 3.699 2.503 4.66v2.331h-2v7h12v-7h-2v-2.331c1.513-.961 2.503-2.7 2.503-4.66 0-2.757-2.243-5-5-5s-5 2.243-5 5c0 1.96.99 3.699 2.503 4.66v2.331h-2v7h12z"/>
      </svg>

      <blockquote class="relative z-10 mb-8">
        <p id="quote" class="text-neutral-100 text-lg leading-relaxed font-light tracking-wide"></p>
      </blockquote>

      <div id="stars" class="flex items-center gap-1 mb-6"></div>

      <div class="flex items-center gap-4">
        <div class="relative">
          <img id="avatar" src="" alt="" class="w-12 h-12 rounded-full border-2 border-neutral-800 object-cover ring-2 ring-emerald-500/30">
          <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 rounded-full border-2 border-neutral-900" aria-hidden="true"></span>
        </div>
        <div>
          <p id="author" class="text-neutral-100 font-semibold text-sm tracking-tight"></p>
          <p id="role" class="text-neutral-500 text-xs tracking-wide uppercase"></p>
        </div>
      </div>

      <div class="mt-6 pt-6 border-t border-neutral-800 flex items-center justify-between">
        <img id="logo" src="" alt="" class="w-10 h-10 rounded-lg opacity-60 hover:opacity-100 transition-opacity grayscale">
        <div class="flex items-center gap-1.5 text-neutral-500 text-xs tracking-widest uppercase">
          <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
          </svg>
          Verified
        </div>
      </div>
    </div>

    <div id="dots" class="flex justify-center gap-2 mt-6"></div>
  </div>

  <script>
    const testimonials = [
      {
        quote: "This completely transformed how our team ships product. What used to take weeks now takes days, and the quality is noticeably better.",
        author: "Sarah Chen",
        role: "VP Engineering at Linear",
        avatar: "https://i.pravatar.cc/300?img=5",
        logo: "https://picsum.photos/seed/linear/64/64",
        rating: 5,
      },
      {
        quote: "The attention to detail in the developer experience is rare. Every edge case has been thought through. It's the first tool I've used that actually gets out of your way.",
        author: "Marcus Johnson",
        role: "Staff Engineer at Vercel",
        avatar: "https://i.pravatar.cc/300?img=12",
        logo: "https://picsum.photos/seed/vercel/64/64",
        rating: 5,
      },
      {
        quote: "We migrated our entire design system in a single sprint. The component API is intuitive, the docs are actually helpful, and the bundle size impact is negligible.",
        author: "Priya Patel",
        role: "Design Systems Lead at Notion",
        avatar: "https://i.pravatar.cc/300?img=28",
        logo: "https://picsum.photos/seed/notion/64/64",
        rating: 5,
      },
    ];

    let current = 0;

    const card = document.getElementById('card');
    const glow = document.getElementById('glow');

    function applyDirection(d) {
      if (d === 0) {
        card.style.transform = 'translateX(0) scale(1)';
        card.style.opacity = '1';
        glow.style.opacity = '1';
      } else {
        card.style.transform = d === 1 ? 'translateX(-20px) scale(0.98)' : 'translateX(20px) scale(0.98)';
        card.style.opacity = '0';
        glow.style.opacity = '0';
      }
    }

    function renderContent() {
      const t = testimonials[current];
      document.getElementById('quote').textContent = t.quote;
      document.getElementById('avatar').src = t.avatar;
      document.getElementById('author').textContent = t.author;
      document.getElementById('role').textContent = t.role;
      document.getElementById('logo').src = t.logo;

      const stars = document.getElementById('stars');
      stars.innerHTML = '';
      stars.setAttribute('aria-label', `${t.rating} out of 5 stars`);
      for (let i = 0; i < 5; i++) {
        const ns = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('class', `w-5 h-5 ${i < t.rating ? 'text-amber-400' : 'text-neutral-700'}`);
        svg.setAttribute('fill', 'currentColor');
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('aria-hidden', 'true');
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', 'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z');
        svg.appendChild(path);
        stars.appendChild(svg);
      }

      const dots = document.getElementById('dots');
      dots.innerHTML = '';
      testimonials.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.setAttribute('aria-label', `Go to testimonial ${i + 1}`);
        btn.setAttribute('aria-current', i === current ? 'true' : 'false');
        if (i === current) {
          btn.className = 'w-6 h-2 rounded-full bg-emerald-500 transition-all duration-300';
          btn.style.boxShadow = '0 0 12px rgba(16,185,129,0.6)';
        } else {
          btn.className = 'w-2 h-2 rounded-full bg-neutral-700 hover:bg-neutral-600 transition-all duration-300';
        }
        btn.addEventListener('click', () => goTo(i));
        dots.appendChild(btn);
      });
    }

    function goTo(i) {
      if (i === current) return;
      const dir = i > current ? 1 : -1;
      applyDirection(dir);
      setTimeout(() => {
        current = i;
        renderContent();
        applyDirection(0);
      }, 200);
    }

    setInterval(() => {
      applyDirection(1);
      setTimeout(() => {
        current = (current + 1) % testimonials.length;
        renderContent();
        applyDirection(0);
      }, 200);
    }, 5750);

    renderContent();
    applyDirection(0);
  </script>
</body>
</html>
